name: Platform Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC

permissions:
  contents: write
  packages: read  # GITHUB_TOKEN needs this to install private @directoryone packages when GH_PACKAGES_TOKEN is unavailable

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check auto-update setting
        if: github.event_name == 'schedule'
        id: auto_check
        run: |
          VALUE=$(gh api repos/${{ github.repository }}/actions/variables/AUTO_UPDATE --jq '.value' 2>/dev/null || echo "false")
          if [ "$VALUE" != "true" ]; then
            echo "Auto-update is disabled. Skipping scheduled run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v5
        if: steps.auto_check.outputs.skip != 'true'

      - uses: pnpm/action-setup@v5
        if: steps.auto_check.outputs.skip != 'true'
        with:
          version: 9

      - uses: actions/setup-node@v5
        if: steps.auto_check.outputs.skip != 'true'
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Update @directory packages
        if: steps.auto_check.outputs.skip != 'true'
        run: pnpm update @directoryone/core @directoryone/ui @directoryone/app
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync route stubs from manifest
        if: steps.auto_check.outputs.skip != 'true'
        run: |
          if [ -f scripts/sync-routes.ts ]; then
            npx tsx scripts/sync-routes.ts || echo "sync-routes warning: continuing"
          fi

      - name: Check for changes
        if: steps.auto_check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.auto_check.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update @directory packages"
          git push
